<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JSON formatter API testing illustration</title>
  <desc id="desc">An original SVG showing a structured JSON payload, validation checks, and API flow cards.</desc>
  <defs>
    <linearGradient id="bg" x1="132" y1="54" x2="1046" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C45A2C"/>
      <stop offset="1" stop-color="#0F7B72"/>
    </linearGradient>
    <linearGradient id="glass" x1="246" y1="123" x2="951" y2="691" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6EC" stop-opacity="0.96"/>
